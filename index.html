<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>danbooru-search</title>
    <meta
      name="description"
      content="匿名搜索 Danbooru posts，支持多 tag 输入、本地过滤和图片预览。"
    >
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/styles.css?v=20260519-local-pages">
  </head>
  <body>
    <main class="app-shell">
      <form class="sidebar" id="searchForm" aria-labelledby="appTitle">
        <header class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <span id="appTitle" class="brand-title">danbooru-search</span>
        </header>

        <div class="sidebar-scroll">
          <section class="search-section" aria-labelledby="searchTitle">
            <h2 id="searchTitle">搜索</h2>
            <div class="tag-composer" id="tagComposer">
              <div class="selected-tags" id="selectedTags"></div>
              <input
                id="tagInput"
                name="tags"
                type="text"
                autocomplete="off"
                spellcheck="false"
                placeholder="输入 tag 后按回车添加"
              >
              <button class="composer-search" id="searchButton" type="submit" aria-label="搜索">
                <span class="button-icon search-icon" aria-hidden="true"></span>
              </button>
            </div>
            <p class="field-hint">支持同时输入多个 tag，用空格或回车分隔</p>
          </section>

          <details class="advanced-options">
            <summary>高级选项</summary>
            <div class="controls">
              <label class="control">
                <span>页数</span>
                <input id="pagesInput" type="number" min="1" max="20" value="3">
              </label>

              <label class="control">
                <span>每页</span>
                <select id="limitInput">
                  <option value="50" selected>50</option>
                  <option value="100">100</option>
                </select>
              </label>
            </div>
            <div class="compact-actions">
              <button class="ghost-button danger-button" id="cancelButton" type="button" hidden>
                停止
              </button>
              <button class="ghost-button" id="clearButton" type="button">清空当前</button>
            </div>
          </details>

          <section class="history-section" aria-labelledby="historyTitle">
            <div class="section-heading">
              <div class="heading-title">
                <button
                  class="collapse-button"
                  id="historyToggleButton"
                  type="button"
                  aria-label="收起历史 Tag"
                  aria-controls="historyList"
                  aria-expanded="true"
                >
                  <span aria-hidden="true"></span>
                </button>
                <h2 id="historyTitle">历史 Tag</h2>
              </div>
              <button class="text-button" id="clearHistoryButton" type="button">清空</button>
            </div>
            <div class="history-list" id="historyList"></div>
          </section>
        </div>
      </form>

      <section class="results-shell" aria-labelledby="resultsTitle">
        <header class="results-header">
          <div>
            <h1 id="resultsTitle">搜索结果</h1>
            <p class="result-summary" id="statusText">等待输入 tag</p>
          </div>
          <div class="view-toggle" aria-label="视图切换">
            <button class="view-button is-active" type="button" aria-label="网格视图">
              <span class="grid-icon" aria-hidden="true"></span>
            </button>
            <button class="view-button" type="button" aria-label="列表视图">
              <span class="list-icon" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <section class="query-strip" aria-live="polite">
          <div class="active-tags" id="currentTags">
            <span class="tag-chip is-muted">等待输入</span>
          </div>
          <div class="result-side">
            <div class="result-count" id="resultCount">0 张图片</div>
            <nav class="pagination-controls" aria-label="顶部本地分页" data-pagination hidden>
              <button class="page-button" type="button" aria-label="上一页" data-page-prev>‹</button>
              <span data-page-indicator>1/1</span>
              <button class="page-button" type="button" aria-label="下一页" data-page-next>›</button>
            </nav>
          </div>
        </section>

        <div class="progress-track" aria-hidden="true">
          <span id="progressBar"></span>
        </div>

        <section class="notice" id="noticeBox" hidden></section>

        <section class="empty-state" id="emptyState">
          <div>
            <p>输入 tag 后，图片会显示在这里。</p>
            <span>默认使用 All 评级和本地过滤。</span>
          </div>
        </section>

        <section class="gallery" id="gallery" aria-label="搜索结果"></section>
        <div class="gallery-footer">
          <nav class="pagination-controls pagination-controls-bottom" aria-label="底部本地分页" data-pagination hidden>
            <button class="page-button" type="button" aria-label="上一页" data-page-prev>‹</button>
            <span data-page-indicator>1/1</span>
            <button class="page-button" type="button" aria-label="下一页" data-page-next>›</button>
          </nav>
        </div>
      </section>
    </main>

    <dialog class="preview-dialog" id="previewDialog">
      <div class="dialog-surface">
        <div class="dialog-toolbar">
          <div>
            <p class="status-label">预览</p>
            <h2 id="dialogTitle">Post</h2>
          </div>
          <div class="dialog-actions">
            <button
              class="meta-toggle-button"
              id="metaToggleButton"
              type="button"
              aria-controls="dialogMeta"
              aria-expanded="false"
            >
              信息
            </button>
            <button class="icon-button" id="closeDialogButton" type="button" aria-label="关闭预览">
              ×
            </button>
          </div>
        </div>
        <div class="dialog-content">
          <div class="dialog-media" id="dialogMedia">
            <img id="dialogImage" alt="">
          </div>
          <aside class="dialog-meta" id="dialogMeta">
            <p class="dialog-tags" id="dialogTags"></p>
            <div class="dialog-stats" aria-label="图片信息">
              <div>
                <span>评级</span>
                <strong id="dialogRating">-</strong>
              </div>
              <div>
                <span>分数</span>
                <strong id="dialogScore">-</strong>
              </div>
              <div>
                <span>尺寸</span>
                <strong id="dialogDimensions">-</strong>
              </div>
              <div>
                <span>文件大小</span>
                <strong id="dialogSize">-</strong>
              </div>
            </div>
            <div class="dialog-links">
              <a id="dialogPostLink" target="_blank" rel="noopener noreferrer">打开 Danbooru</a>
              <a id="dialogFileLink" target="_blank" rel="noopener noreferrer">打开图片</a>
            </div>
          </aside>
        </div>
      </div>
    </dialog>

    <template id="postTemplate">
      <article class="post-card">
        <button class="image-button" type="button">
          <img loading="lazy" decoding="async" alt="">
          <span class="post-overlay">
            <span class="rating-badge"></span>
            <span class="score-label"></span>
            <span class="post-id"></span>
            <span class="post-tags"></span>
          </span>
        </button>
        <a class="post-link" target="_blank" rel="noopener noreferrer" aria-label="打开 Danbooru">
          ↗
        </a>
      </article>
    </template>

    <script src="js/app.js?v=20260519-local-pages"></script>
  </body>
</html>
